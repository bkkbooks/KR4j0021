body:
  text: 丹陽詞宋葛勝仲撰江神子初至休寜冬夜作昬昬雪意慘雲容獵霜風歲將窮流落天涯顦顇一衰翁清夜小窗圍獸火傾酒綠借顔紅官梅疎豓小壺中暗香濃玉玲瓏對景忽驚身在大江東上國故人誰念我晴嶂逺莫雲重蝶戀花二月十三日同安人生日作二首雨後春光濃似醉著柳催花節物侵龍忌繡褓香閨當日珮紫蘭宫墮人間世歌管停雲香吐穟碧酒紅裳共祝魚軒貴天上阿環金籙秘龜鶴共夀三千歲又共樂堂深簾不捲側側寒輕二月春猶淺續夀競來歌舞院龍涎香襯鮫綃段畫棟朝飛雙語燕端似知人著意窺金盞柳外花前同祝願朱顔長在年齡逺臨江仙尉姜補之託疾臥家作郊外黄垓端可厭歸來移病香閨象床珍簟共委蛇耆婆尋草盡天女散花遲小雨作寒秋意晚簷聲與夢相宜冷侵羅幌酒煙微試評書五朶何似畫雙眉漁家傲初創真意亭于南溪遊陟晚歸作嵓壑縈囘雲水窟林深路斷迷煙客茆屋數椽攜杖舄人寂寂侵簷萬箇琅玕碧倦客羈懐清似滌更無一㸃飛埃迹溪漲漫流過几席寒湜湜鳬鷖㸃破琉璃色又叠叠雲山供四顧簿書忙裏偷閒去心逺地偏陶令趣登覽處清幽疑是斜川路野蔌溪毛供飲具此身甘被煙霞痼興盡碧雲催日莫招晚渡遙遙一葉隨鷗鷺鷓鴣天九月十三日攜家遊夏氏林亭燕集作并送湯詞小榭幽園翠箔垂雲輕日薄淡秋暉菊英露浥淵明徑藕葉風吹叔寶池酬素景泥芳巵老人癡鈍强伸睂懽娯莫遣笙歌散歸路從教燈影稀又婆律香濃氣味佳玻瓈仙盌進流霞凝膏清滌高陽醉靈液甘和正焙芽香染指浪浮花加籩禮盡客還家貫珠聲斷紅裳散踏影人歸素月斜㸃絳唇縣齋愁坐作秋晚寒齋藜床香篆橫輕霧閒愁幾許夢逐芭蕉雨雲外哀鴻似替幽人語歸不去亂山無數斜日荒城鼓行香子愁況無聊作風物颼颼木落滄洲漸老人不奈悲秋羈懐都在鬢上睂頭似休文瘦文通恨子山愁庭梧影薄籬菊香浮强招尋聊命朋儔窮通皆夢今古如流且淵明徑子猷舫仲宣樓訴衷情清明寒食景暄妍花映碧羅天參差捍撥齊奏豐頰擁芳筵逢誕日揖真仙託爐煙朱顔長似頭上花枝歳歳年年水調歌頭程良器嘉量别賦一闋紀泛舟之㑹往返次韻夜泛南溪月光影冷涵空棹飛穿碎金電翻動水精宫横管何妨三弄重醑仍須一斗知費幾青銅坐乆桂花落襟袖覺香濃庾公閣子猷舫興應同從來好景良夜我輩敢情鍾但恐仙娥川后嫌我塵容俗狀清境不相容擊汰同情賞賴有紫溪翁又下瀨驚舩駛揮麈恐尊空誰吹尺八寥亮嚼徴更含宫坐愛金波瀲灧影落蒲萄漲綠夜漏儘移銅囘棹攜紅袖一水帶香濃坐中客馳雋辨語無同青鞵黄帽此樂誰肯換千鍾岩壑從來無主風月故應長在賞不待先容羽化尋煙客家有左仙翁又勝友欣傾葢羈宦嬾書空愛君筆力清壯名已在蟾宫蕭散英姿直上自有練帬葛帔豈待半通銅長短作新語墨紙似鴉濃山吐月溪泛艇率君同吾儕轟飲文字樂不在歌鍾今夜長風萬里且倩泓澄浩蕩一為洗塵容世上閒榮辱都付塞邊翁朩蘭花與諸人泛溪作朩蘭干外池光闊午夜喬林迷岸樾掠舩涼吹起青蘋縈水歌聲欺白雪檀郎響趂紅牙節雅韵嘈嘈仍切切人生何樂似同襟莫待驪駒聲慘咽滿庭霜任昉嘗為新安太守風流名迹圖經史牒具載感今懷古作百不為多一不為少阿誰昔仕吾邦共推任筆洪鼎力能扛不為桃花祿米讎書倦一葦横江招尋處徒行曳杖曾不擁麾幢山川真大好魚磯無恙密嶺難雙聴訟訴多就樵塢僧窗歲月音容逺矣風流在遐想心降雲煙路􅊧竒弔古時為酹空缸醉蓬萊天寜節作望蔥蔥佳氣虹渚祥開斗樞光遶析朩天津正靈暉騰照鷺綴分班象胥交貢奉御觴清曉玉殿寒輕金徒漏永瑞爐煙裊萬㝢均歡示慈頒燕夀祝南山慶均鳬藻縹緲紅雲望九重天表舞獸鏘洋抃鼇欣戴度管絃聲杳厯草長新蟠桃永秀與天難老西江月正月十七日與文中自邑境徧遊歙黟祁門山水十九日在黟邑同靈觀夜燕作羈宦新來作惡窮途誰肯相從追攀十日水雲中情誼知君獨重寂寂回廊小院㝠㝠細雨尖風鳳山香雪定應空昨夜疎枝入夢又山鎮紅桃阡陌煙迷綠水人家塵容誤到只驚嗟骨冷玉堂今夜莫對佳人錦瑟休辭洞府流霞峯回路轉亂雲遮歸去空傳圖畫南鄉子三月望日與文中諸賢泛舟南溪作柳岸正飛綿選勝齎輕漾碧漣笑語忘懐機事盡鷗邊萬頃溪光上下天菰葦久延縁不覺遙峯靄莫煙對酒莫嫌紅粉陋嬋娟自有孤高月婦仙浣溪沙朩芍藥詞可惜隨風面旋飄直須燒燭看嬌嬈人間花月更無妖濃麗獨將春色殿繁華端合衆芳朝南床應為醉陶陶又通白輕紅溢萬枝濃香百知透豐肌丹山威鳳勢將飛玉鏡臺前呈國豓沈香亭壮映朝曦如花惟有上皇妃又鬭鴨欄邊曉露沾華堂醉賞軸珠簾插花人好手纖纖遮䕶輕寒施翠幄標題仙品露牙籤詞人遺恨獨江淹西江月次韻林茂南博士杞泛溪山外半規殘日雲邊一縷餘霞滿城飛雪散苕花萬頃溪連罨畫柳惲風流舊國鶴齡瀟洒人家肯嗟流落在天涯雲水從今起價又代監酒和晚路交游綠酒平生志趣青霞霜風時節近黄花泛宅舟將鷁畫不分兩溪明月夜深只屬漁家今朝清賞寄情涯肯向榮塗索價蝶戀花和王廉訪風過漣漪紋縠細十指香檀驚破交禽睡野蔌溪毛真易致風流未減蘭亭㑹擊汰千艘供洛禊映水垂楊萬縷拖濃翠小海一聲波上戲慇勤畱客千金意臨江仙燕諸部使者自古呉興稱冷僻菰城水浸粼粼回星難望使車塵如何三日飲倂有五行人文似枚臯加敏速記書易若張巡幙中無用郄嘉賓他年浮棗㑹莫忘兩溪春又千古烏程新釀美玉觴風過粼粼歌聲未辦起梁塵九天持斧客來作繡衣人夙有辭華驚乙覽傳聞獻頌東巡未應握節久賓賓一封馳詔旨却醉上林春又與葉少藴夢得上巳遊法華山九曲池流盃小樣洪河分九曲飛泉環遶粼粼青蓮往事已成塵羽觴浮玉甃寶劍捧金人綠綺且依流水調蓬蓬擂鼓催巡玉堂詞客是佳賓茂林脩竹地大勝永和春定風波與葉少藴陳經仲彥文燕駱駝橋少藴作次韻二首千叠雲山萬里流坐中碧落與鼇頭真意見嬉吾已領煙景不辭捧詔乆汀洲老去一官真是漫溪岸獨餘此興未能收畱與吳兒傳勝事長記赤欄橋上攬清秋又共喜新涼大火流一聲水調聴歌頭況有脩蛾兼粉領佳景謝公無不礙滄洲平昔短檠真大漫氣岸老來都向酒盃收雲水光中修禊事猶記轉頭不覺巳三秋浣溪沙少藴内翰同年寵速且出後堂并製歌詞侑觴即席和韻二首今夜風光戀渚蘋欲教四角出車輪金釵離立座生春神女恍驚巫峽夢飛瓊原是閬風人詔封後院寵儒臣又溪岸沈深屬泛蘋傾城容貌此推輪可憐虚度二年春莫莫來時騷客賦朝朝新處後庭人天畱花月伴羈臣又少藴内翰同年寵速遣妓隠簾吹笙因成一闋東道慇勤玉斚飛華燈傾國擁珠璣玉奴嫌瘦玉環肥縹緲幸聞緱嶺曲參差猶隔夏侯衣放開雲月出清輝瑞鷓鴣和通判送别兩年人住豈無情别椉辭華四水清何事千鍾勤飲餞故知一别未能輕解龜雖幸樊籠出挂席還愁海汐平江艸江花都是淚驪駒休作斷膓聲浪淘沙將去南陽作步屧對東風細探春工百花堂下牡丹叢莫恨使君來便去不見鞓紅霧眼一衰翁無意芳穠年來結習巳成空寄語國香雕檻裏好為人容驀山溪天穿節和朱刑掾二首望雲門外油璧如流水空巷逐朱旛步春風香河七里冶容袨服摸石道宜男穿翠靄度飛橋影在清漪裏吳頭楚尾千古風流地試問漢江邊有解珮行雲舊事主人是客一笑强頒春燒燈後賞花前遙憶年年醉又春風野外卵色天如水魚戲舞綃紋似出聴新聲北里追風駿足千騎巻高門一箭過萬人呼雁落寒空裏天穿過了此日穿名地摸石俯清波競追隨新年樂事誰憐老子使得縱遨遊争捧手乍憑肩夾道遊人醉又出門西笑千里長安道不用引離聲便登榮十洲三島畫舩珠箔蘋末水風涼隋岸栁楚臺人景與人俱好應嗟見晚玉殿生清曉正是妙年時步承明謀身須早軺車膚使新逐凱歌囘恩綍重綵衣輕嘉慶知多少西江月二首一連水東樓燕集一泛舟豓曲醉歌金縷朱門高聳銅鐶中天樓觀共躋攀飛絮落花春晚低映綠隂朱户斜拖素練滄灣銀鈎華榜五雲間奕奕蛟龍字綰又靺鞨斜紅帶柳琉璃漲綠平橋人間風月正新妖不數江南蘇小恨寄飛花蔌蔌情隨流水迢迢鯉魚風送朩蘭橈囘棹荒雞報曉又與王庭錫登燕集作清樾已生晝寂孤花尚表春餘象床筠簟燕堂虚初過晚涼㣲雨珪璧新來北苑鱸蓴未減東呉捧觴紅袖透香膚不浥翔龍煙縷又叔父慶八十㑹作瑞獸香雲輕裊華堂繡幙低垂人生七十尚為稀況是釣璜新歳登俎青梅的皪明欄紅藥芳菲天教睂夀過期頤常對風光沈醉浣溪沙賞芍蘂樓子包金照眼新香根猶帶廣陵塵翻堦不羨掖垣春不分與花為近侍難甘溱洧贈閒人如羞如怨獨含顰虞美人酬衛卿弟兄贈三年曾不窺園樹辛苦螢窗莫怪來文譽滿清時柿葉書殘猶自日臨池春秋新學卑繁露黄巻聊堪語家人不用寄龜詩行看昇平樓外化龍歸又一輪丹桂窅窊樹光景疑非莫天公著意在兹時掃盡㣲雲㸃綴展清池樽前金奏無晨露只有君房語驪駒客莫賦歸詩東道留連應賦不庸歸一作共踏青槐碎影夜闌歸瑞鷓鴣工部七月一日生辰火風欲避金風至秀氣充閭初降瑞去家丁令却歸來還燕懸弧當日地金章紫綬身榮貴夀福天儲昌又熾怪來一歲四遷官還遇當生元太歲鵲橋仙七夕鵲橋仙偶天津輕渡却笑嫦娥孤皎平時五夜似經年問何事今宵便曉雲車將駕神夫畱戀更吐心期多少支機休浪與閒人莫倚賴芳心素巧江城子呈劉無言燾浮家重過水晶宫五年中事何窮無恙山溪鬟影落青銅欲向舊遊尋舊事雲散彩水流東苔花向我似情鍾舞霜風雪濛濛應怪使君顔鬢便衰翁賴是尋芳無素約端不恨綠隂重又和無言雪詞飛身疑到廣寒宫玉花中興何窮酒貴旗亭誰是惜青銅飄瞥三呉真妙絶銀萬里失西東草堂紅蠟煗歌鍾巻簾風賞空濛豐頰修睂鶴氅擁仙翁欲作氍毹花底客清漏永禁城重蝶戀花章道祖倧生日安石橊花濃綠映解慍風輕乍改朱明令衮繡元臣門戸盛童孫此日懸弧慶夜宴華堂添酒興黄紙除書逺帶天香賸欲浥苕波供續命不須龍䕶江心鏡南鄉子九日用玉局翁韻作呈坐上諸公晴日亂雲收人在蘋香柳惲洲溪上清風樓上醉颼颼共折黄花插滿頭佳客獻還酬不負山城九日秋苕碧下青供酩酊休休楚客當年浪自愁又拂檻曉雲鮮銷暑樓危竦半天曾是攜賓當薦九開筵度水縈山奏管絃黄菊映華顛千騎重來已六年樓下東流當日水依然更對周旋舊七賢減字朩蘭花薛肇明二侍姬至葛山觀梅薛公㑹作葛山仙隱尚有餘膏畱舊鼎十里梅花夾道争看衮繡華人間妙麗竝侍黄扉開國貴僻壤孤芳羞澀尊前不敢香臨江仙上巳日遊海昌王氏園呉宰傚反中散兄倦客身同舟不繫輕帆來訪臞仙春風元已豓陽天夭桃方散錦高栁欲飛綿千古海昌佳絶地雙鳬暫此畱連通宵娛客破芳尊蘭亭脩禊事梓澤醉名園又席上和呈中散兄及呉令寶觀岧嶤飛雉堞登臨恍欲升仙野桃官柳襯呉天春風寒食夜遺恨在封綿聞道東溟才二里銀濤直與天連憑誰都巻入芳尊賦歸歡靖節消渇解文園減字朩蘭花公弼姪初授官辛勤塲屋未遇知音甘陸陸詔錄遺忠一札天書下九重鵝城初命此去青雲應漸近解褐恩新今歲吾家第四人又病起不見杏花作杏花零亂擬把百觚來判斷病臥漳濱不見枝頭閙小春吾衰老矣一醉花前猶不遂情緒厭厭虛度韶光又一年虞美人自蘭陵歸冬夜飲嚴州酒作嚴陵灘畔香醪好遮莫東方曉春風盎盎入寒肌人道霜濃臘月我還疑紅爐火熟香圍坐梅蕋迎春破一聲清唱解人頤人道牢愁千斛我誰知鷓鴣天玉琯還飛換歳灰定山新棹酒船回年時梁燕雙雙在肯為人愁便不來衰意緒病情懐玉山今夜為誰頹年時梅蕊垂垂破肯為人愁便不開西江月送衛卿弟赴定逺簿萬巻舊推鴻博一官且慰蹉跎升平樓下賜危科曾對顒昻黼坐燕頷從來骨貴鸞栖尚屈才多今宵且共入無何定逺功名么麽浪淘沙十月十九夜賞菊我愛菊花枝浥露偏宜旋移佳種一年期照眼黄金三徑爛可但東籬秋老摘花吹敢恨開遲只愁一夜便香衰待插滿頭年大也且泛芳巵鷓鴣天賞菊二首黄菊鮮鮮帶露濃小園開遍度香風自篘玉醖酬朝色旋洗霜須對晚叢香在手莫匆匆尋芳今夜有人同黄金委地新收得莫道山翁到底窮又采采黄花鵠彩濃吹開一夜為霜風已邀騷客陶元亮不用歌姬盛小叢秋易老莫匆匆齊山高興古今同欲知此地花多少一眼金英望不窮朩蘭花十二月二十日盧姊生辰談圍曾蔽青綾帳林下中年敦素尚煙波偶趂一帆風却鎖雲扄來就養自從悟得空無相身把虛空來作樣大千沙界抹為塵未比無生真夀量醉花隂次韻印師東皇已有來歸耗十里青山道凍枿萬株梅一夜粧成似趂鳴雞早年時清賞曹同到先仗遊蜂報抖擻舊心情一笑酬春不羨和羮詔浣溪沙賞梅東閣郎官巧寫真西湖處士妙傳神嫣然一笑臈前春鬭好雖無氷骨女相宜幸是雪髥人且煩疎影入清尊又卜飲槃裏明珠芡實香尊前堆雪膾絲長何妨羌管奏伊涼翠葆重生無復日白波不釂有如江壁間醉墨任淋浪臨江仙章圃賞瑞香二首二月風光濃似酒小樓新溼青紅碧琉璃色映羣峰更攜金鑿落來賞錦薰籠調客舊畱闕月旦此花清軟纖穠未饒蘭蕙轉光風赤欄呈雅豓翠幙䕶芳叢又雪壁歌詞題尚溼春風又見輕紅一枝斜插映頭峯不辭連夜賞銀燭透紗籠白髮欺人今老矣尊前羞見繁穠清香尤嫪虎溪風海棠須避席佳種謾蠶叢浣溪沙賞酴醿一夜狂風盡海棠此花天遣殿羣芳芝蘭百濯見真香勸客淋浪燈底韻惱人魂夢枕邊囊一枝闕揷不闕鵲橋仙七夕涼颷破暑清歌縈坐缺月稀星庭户𤓰華艸艸具盃盤喜共浥初筵零露天孫東處牽牛西望勸汝一盃清醑精靈何必侍秋通為一洗朦朧今古臨江仙二月廿二日錦熏閣賞花檻外竒葩江外種嬌春未減鞓紅畫樓晴日斂雲峯佛香來海岸蜀錦薦燈籠今夜􅄼憂殺風景酒花來鬭妖濃江梅冷淡避春風明朝來縱賞應醉綺羅叢蝶戀花次韻張千里駒照花二月春遊須爛漫秉燭看花只為晨曦短高舉蠟薪通夕看紅光萬丈騰天半寄語平時遊冶伴不負分隂勝事輸今段燈火休催歸小院慇勤更照桃花面又再次韻千里駒照花百紫千紅今爛漫舉燭輝花莫厭燒今短酒裏逢花須細看人生誰是英雄半安得紅顔為老伴妙舞花前楊栁誇身段已倒玉山迴竹院清香不㫁風吹面又巳過春分春欲去千炬花間作意畱春住一曲清歌無誤顧遶梁餘韻歸何處盡日勸春春不語紅氣蒸霞旦看桃千樹才子霏談更五鼔􅓑看走筆揮風雨浪淘沙九月十八日與千里賞菊三首又見菊花新色淺香勻老人衰病臥漳濱雖是無聊仍止酒幸有嘉賓不用怨蕭辰不似芳春請看金蕊照金尊今夜花前須醉倒直到黎明又歌闋鬭清新檀板初勻畫堂新築太湖濱好是黄花開應候聊宴親賓上客即逢辰況是青春上林開宴錫堯尊今夜素娥真解事偏向人明又娯老小亭新丹堊初勻萬枝金菊遶溪濱折向華堂遮醉眼聊用娯賓紅燭夜香辰廣坐生春月波新釀入芳尊好向花前􅂸爛醉不負承明丹陽詞
